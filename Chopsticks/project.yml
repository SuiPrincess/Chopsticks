name: Chopsticks
options:
  bundleIdPrefix: com.suiprincess
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  Chopsticks:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarHidden: true
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "近くのプレイヤーと対戦するために使用します"
        INFOPLIST_KEY_NSBonjourServices: "_chopsticks._tcp"
        INFOPLIST_KEY_GCSupportsGameCenterMVC: true
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.suiprincess.chopsticks
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_ENTITLEMENTS: Chopsticks.entitlements
