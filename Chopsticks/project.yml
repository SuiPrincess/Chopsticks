name: Chopsticks
options:
  bundleIdPrefix: com.chopsticks
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  Chopsticks:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - project.yml
          - "*.xcodeproj/**"
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIStatusBarHidden: true
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.chopsticks.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
